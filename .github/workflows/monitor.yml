name: Freezer Price Monitor

on:
  push:
    branches: [ main ]  # Runs every time you save/push code
  schedule:
    - cron: '0 13 * * *' # 13:00 UTC is exactly 8:00 AM in Round Rock, TX
  workflow_dispatch:     # Keeps your manual "Run workflow" button active

permissions:
  contents: write       # Essential for saving data back to your repo

jobs:
  price_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # This installs the actual Chromium browser used by Playwright
          python -m playwright install chromium --with-deps

      - name: Run price monitor
        run: python monitor_freezer.py

      - name: Commit and Push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add freezer_prices.json
          # || echo "No changes" prevents the script from failing if prices didn't change
          git commit -m "chore: update freezer prices [skip ci]" || echo "No changes to commit"
          git push
